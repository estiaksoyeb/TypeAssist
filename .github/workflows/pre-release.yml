name: Make Pre release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+-preview.[0-9]+'

jobs:
  release-for-github:
    name: "Preview Release for GitHub"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Android NDK
        run: |
          echo "y" | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.0.12077973"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'adopt'
          java-version: 17

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Build release APKs (Preview)
        run: ./gradlew assembleRelease --stacktrace

      - name: Get tag name
        if: startsWith(github.ref, 'refs/tags/')
        run: echo "VERSION_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Verify build output
        run: |
          echo "=== All APKs found ==="
          find app/build/outputs/apk -name "*.apk" -type f
          for FLAVOR in full fdroid; do
            RELEASE_DIR="app/build/outputs/apk/${FLAVOR}/release"
            if [ ! -d "$RELEASE_DIR" ]; then
              echo "Missing expected release dir: $RELEASE_DIR"
              exit 1
            fi
            echo "--- $FLAVOR ---"
            ls -lah "$RELEASE_DIR"
          done

      - name: Sign APKs
        run: |
          set -e

          # Decode the Keystore from the Secret (BASE64)
          echo "${{ secrets.SIGNING_KEY_BASE64 }}" | base64 -d > release.keystore

          APKSIGNER="$ANDROID_HOME/build-tools/34.0.0/apksigner"
          SIGNED_PATHS=""
          CHECKSUM_FULL=""
          CHECKSUM_FDROID=""

          for FLAVOR in full fdroid; do
            RELEASE_DIR="app/build/outputs/apk/${FLAVOR}/release"
            apk_file="$RELEASE_DIR/app-${FLAVOR}-release-unsigned.apk"
            if [ "$FLAVOR" = "full" ]; then
              signed_apk="$RELEASE_DIR/TypeAssist-${VERSION_TAG}.apk"
            else
              signed_apk="$RELEASE_DIR/TypeAssist-${FLAVOR}-${VERSION_TAG}.apk"
            fi

            if [ ! -f "$apk_file" ]; then
              echo "APK not found: $apk_file"
              ls -lah "$RELEASE_DIR"
              rm release.keystore
              exit 1
            fi

            $APKSIGNER sign \
              --ks release.keystore \
              --ks-key-alias "${{ secrets.ALIAS }}" \
              --ks-pass "pass:${{ secrets.KEY_STORE_PASSWORD }}" \
              --key-pass "pass:${{ secrets.KEY_PASSWORD }}" \
              --out "$signed_apk" \
              "$apk_file"

            $APKSIGNER verify "$signed_apk"
            ls -lh "$signed_apk"

            checksum=$(sha256sum "$signed_apk" | awk '{ print $1 }')
            if [ "$FLAVOR" = "full" ]; then
              CHECKSUM_FULL="$checksum"
            else
              CHECKSUM_FDROID="$checksum"
            fi
            SIGNED_PATHS="$SIGNED_PATHS\n$signed_apk"
          done

          rm release.keystore

          echo "apk_sha256_full=$CHECKSUM_FULL" >> "$GITHUB_ENV"
          echo "apk_sha256_fdroid=$CHECKSUM_FDROID" >> "$GITHUB_ENV"
          printf "%b" "$SIGNED_PATHS" | sed '/^$/d' > signed_apk_paths.txt
          echo "signed_apk_paths_file=signed_apk_paths.txt" >> "$GITHUB_ENV"

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION_TAG }}
          name: "TypeAssist ${{ env.VERSION_TAG }}"
          body: |

            ### Checksums
            | Variant | SHA-256 |
            | ------- | ------- |
            | Full (Preview) | ${{ env.apk_sha256_full }} |
            | F-Droid (Preview) | ${{ env.apk_sha256_fdroid }} |
          files: |
            app/build/outputs/apk/full/release/TypeAssist-${{ env.VERSION_TAG }}.apk
            app/build/outputs/apk/fdroid/release/TypeAssist-fdroid-${{ env.VERSION_TAG }}.apk
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
